# Pull application images from GitHub Container Registry (GHCR).
# GHCR_OWNER and IMAGE_TAG are defined in CD workflows

name: reactauth-${ENVIRONMENT:-dev}

services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/react-auth-backend:${IMAGE_TAG:-develop}
    platform: linux/amd64
    container_name: reactauth-${ENVIRONMENT:-dev}-backend
    ports:
      - "${HOST_BACKEND_PORT:-3001}:3001"
    labels:
      - "com.docker.compose.service=backend"
      - "app.url=http://localhost:${HOST_BACKEND_PORT:-3001}"
      - "app.port=${HOST_BACKEND_PORT:-3001}"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-secret-key}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: ghcr.io/${GHCR_OWNER}/react-auth-frontend:${IMAGE_TAG:-develop}
    platform: linux/amd64
    container_name: reactauth-${ENVIRONMENT:-dev}-frontend
    ports:
      - "${HOST_FRONTEND_PORT:-80}:80"
    environment:
      - VITE_API_URL=${PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "com.docker.compose.service=frontend"
      - "app.url=http://localhost:${HOST_FRONTEND_PORT:-80}"
      - "app.port=${HOST_FRONTEND_PORT:-80}"

volumes:
  backend-data:
