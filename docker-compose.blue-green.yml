# Blue-Green deployment: Nginx reverse proxy + Blue and Green environments
# Traffic is routed to active environment via nginx/active.conf; switch with scripts/switch-to-*.sh

services:
  nginx:
    image: nginx:alpine
    container_name: app-nginx
    ports:
      - "80:80"
      - "3001:3001"
    volumes:
      - ./nginx:/etc/nginx:ro
    networks:
      - app_network
    restart: unless-stopped
    depends_on:
      - blue-frontend
      - blue-backend
      - green-frontend
      - green-backend

  # --- Blue (active by default) ---
  blue-backend:
    image: bozhinovskam/react-auth-backend:latest
    container_name: blue-backend
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-secret-key}
    volumes:
      - blue-backend-data:/app/data
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  blue-frontend:
    image: bozhinovskam/react-auth-frontend:latest
    container_name: blue-frontend
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - blue-backend
    networks:
      - app_network
    restart: unless-stopped

  # --- Green (new version) ---
  green-backend:
    image: bozhinovskam/react-auth-backend:latest
    container_name: green-backend
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-secret-key}
    volumes:
      - green-backend-data:/app/data
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  green-frontend:
    image: bozhinovskam/react-auth-frontend:latest
    container_name: green-frontend
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - green-backend
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  blue-backend-data:
  green-backend-data:
