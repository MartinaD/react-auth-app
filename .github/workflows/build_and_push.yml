name: Build and push image

on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
        description: backend or frontend
      image_name:
        type: string
        required: true
        description: Image name under ghcr.io/owner (e.g. react-auth-backend)
      tags_csv:
        type: string
        required: true
        description: Comma-separated image tags (suffix only, e.g. develop,abc1234)
      push:
        type: boolean
        required: true
      vite_api_url:
        type: string
        required: false
        default: http://localhost:3001
        description: VITE_API_URL build-arg when service is frontend

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner for GHCR
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        env:
          OWNER: ${{ steps.vars.outputs.owner }}
          NAME: ${{ inputs.image_name }}
          CSV: ${{ inputs.tags_csv }}
        run: |
          BASE="ghcr.io/${OWNER}/${NAME}"
          OUT=""
          IFS=',' read -ra ARR <<< "$CSV"
          for t in "${ARR[@]}"; do
            t=$(echo "$t" | xargs)
            [ -z "$t" ] && continue
            OUT="${OUT}${BASE}:${t}"$'\n'
          done
          {
            echo "tags<<EOF"
            echo -n "$OUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (backend)
        if: inputs.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ inputs.push }}
          tags: ${{ steps.prep.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (frontend)
        if: inputs.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ inputs.push }}
          tags: ${{ steps.prep.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ inputs.vite_api_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
