name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "release-*"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop
      - "release-*"

# Concurrency group prevents multiple CI runs for the same PR or branch (same SHA)
# For main branch, each run has a unique run_id. For other branches, each PR has a unique number
concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}

permissions:
  contents: read

jobs:
  # Conventional commit PR title validation
  pre_checks:
    name: Pre-checks
    runs-on: ubuntu-latest
    outputs:
      run_backend: ${{ steps.affected.outputs.run_backend }}
      run_frontend: ${{ steps.affected.outputs.run_frontend }}
      image_tag: ${{ steps.image_tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Conventional commit PR title
        if: github.event_name == 'pull_request'
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$TITLE" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert|hotfix)(\(.+\))?:[[:space:]].+$ ]]; then
            echo "PR title matches conventional commits"
          else
            echo "::error::PR title must follow conventional commits, e.g. feat: add login"
            exit 1
          fi

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          json: "true"
          dir_names_max_depth: 2

      # Determine which services need to be tested based on changed files
      - name: Affected services
        id: affected
        env:
          FILES_JSON: ${{ steps.changed-files.outputs.all_changed_and_modified_files }}
        run: |
          set -euo pipefail
          if ! echo "$FILES_JSON" | jq empty 2>/dev/null; then
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
            echo "run_frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          COUNT=$(echo "$FILES_JSON" | jq "length")
          if [ "$COUNT" -eq 0 ]; then
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
            echo "run_frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          REBUILD=$(echo "$FILES_JSON" | jq '[.[] | select(test("\\.github/|(^|/)Dockerfile|docker-compose"))] | length')
          if [ "$REBUILD" -gt 0 ]; then
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
            echo "run_frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BE=$(echo "$FILES_JSON" | jq '[.[] | select(test("^backend/"))] | length')
          FE=$(echo "$FILES_JSON" | jq '[.[] | select(test("^frontend/"))] | length')
          if [ "$BE" -gt 0 ]; then RB=true; else RB=false; fi
          if [ "$FE" -gt 0 ]; then RF=true; else RF=false; fi
          if [ "$RB" = false ] && [ "$RF" = false ]; then
            RB=true
            RF=true
          fi
          echo "run_backend=$RB" >> "$GITHUB_OUTPUT"
          echo "run_frontend=$RF" >> "$GITHUB_OUTPUT"

      # Generate image tag for the build and push to artifact
      - name: Image tag
        id: image_tag
        run: |
          TAG="${GITHUB_SHA:0:7}_${GITHUB_RUN_NUMBER}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "$TAG" > image_tag.txt

      - name: Upload image tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image_tag.txt
          if-no-files-found: error
  # Tests are run in parallel
  test_backend:
    name: Test (backend)
    needs: pre_checks
    if: needs.pre_checks.outputs.run_backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  test_frontend:
    name: Test (frontend)
    needs: pre_checks
    if: needs.pre_checks.outputs.run_frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm test

  # Docker verify is run after the tests are successful
  docker_verify_backend:
    name: Docker verify (backend)
    needs: [pre_checks, test_backend]
    if: needs.test_backend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: react-auth-backend:ci

  docker_verify_frontend:
    name: Docker verify (frontend)
    needs: [pre_checks, test_frontend]
    if: needs.test_frontend.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: react-auth-frontend:ci
          build-args: |
            VITE_API_URL=http://localhost:3001
