# Continuous deployment — development
# Dev stack: UI on host port 80, API on 3001 (defaults in docker-compose.ghcr.yml)

name: CD — Development

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build & push backend
    uses: ./.github/workflows/build_and_push.yml
    with:
      service: backend
      image_name: react-auth-backend
      tags_csv: develop,${{ github.sha }}
      push: true
    secrets: inherit

  build-frontend:
    name: Build & push frontend
    uses: ./.github/workflows/build_and_push.yml
    with:
      service: frontend
      image_name: react-auth-frontend
      tags_csv: develop,${{ github.sha }}
      push: true
      vite_api_url: ${{ vars.DEV_VITE_API_URL || 'http://localhost:3001' }}
    secrets: inherit

  deploy:
    name: Deploy (development)
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase GHCR owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Validate compose (GHCR)
        env:
          GHCR_OWNER: ${{ steps.vars.outputs.owner }}
          IMAGE_TAG: develop
          ENVIRONMENT: dev
          HOST_FRONTEND_PORT: "80"
          HOST_BACKEND_PORT: "3001"
        run: docker compose -f docker-compose.ghcr.yml config

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy (dev — localhost:80 / :3001 on runner)
        env:
          GHCR_OWNER: ${{ steps.vars.outputs.owner }}
          IMAGE_TAG: develop
          ENVIRONMENT: dev
          HOST_FRONTEND_PORT: "80"
          HOST_BACKEND_PORT: "3001"
        run: |
          docker compose -f docker-compose.ghcr.yml pull
          docker compose -f docker-compose.ghcr.yml up -d

      - name: Smoke test API
        run: |
          sleep 5
          curl -sSf "http://localhost:3001/api/health"

      - name: Deployment summary
        run: |
          O="${{ steps.vars.outputs.owner }}"
          echo "Dev images: ghcr.io/${O}/react-auth-backend:develop — UI http://localhost:80 API http://localhost:3001"
          echo "On your machine (after docker login ghcr.io):"
          echo "  export GHCR_OWNER=${O} IMAGE_TAG=develop ENVIRONMENT=dev HOST_FRONTEND_PORT=80 HOST_BACKEND_PORT=3001"
          echo "  docker compose -f docker-compose.ghcr.yml pull && docker compose -f docker-compose.ghcr.yml up -d"
          echo "Note: GitHub-hosted runners are ephemeral; this deploy runs on the CI VM, not your laptop. Use self-hosted runner or repeat the export commands locally."
