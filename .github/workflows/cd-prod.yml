# Runs only after the "CI" workflow succeeds on a push to `main` (includes merge commits).
# Direct pushes to main no longer trigger CD alone — CI must pass first.

name: CD — Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build-backend:
    name: Build & push backend
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    uses: ./.github/workflows/build_and_push.yml
    with:
      service: backend
      image_name: react-auth-backend
      tags_csv: latest,main,${{ github.event.workflow_run.head_sha }}
      push: true
      checkout_ref: ${{ github.event.workflow_run.head_sha }}
    secrets: inherit

  build-frontend:
    name: Build & push frontend
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    uses: ./.github/workflows/build_and_push.yml
    with:
      service: frontend
      image_name: react-auth-frontend
      tags_csv: latest,main,${{ github.event.workflow_run.head_sha }}
      push: true
      vite_api_url: ${{ vars.PROD_VITE_API_URL || 'http://localhost:3002' }}
      checkout_ref: ${{ github.event.workflow_run.head_sha }}
    secrets: inherit

  deploy:
    name: Deploy (production)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Lowercase GHCR owner
        id: vars
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Validate compose (GHCR)
        env:
          GHCR_OWNER: ${{ steps.vars.outputs.owner }}
          IMAGE_TAG: latest
          ENVIRONMENT: prod
          HOST_FRONTEND_PORT: "8088"
          HOST_BACKEND_PORT: "3002"
        run: docker compose -f docker-compose.ghcr.yml config

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and deploy (prod — localhost:8088 / :3002 on runner)
        env:
          GHCR_OWNER: ${{ steps.vars.outputs.owner }}
          IMAGE_TAG: latest
          ENVIRONMENT: prod
          HOST_FRONTEND_PORT: "8088"
          HOST_BACKEND_PORT: "3002"
        run: |
          docker compose -f docker-compose.ghcr.yml pull
          docker compose -f docker-compose.ghcr.yml up -d

      - name: Smoke test API
        run: |
          sleep 5
          curl -sSf "http://localhost:3002/api/health"

      - name: Deployment summary
        run: |
          O="${{ steps.vars.outputs.owner }}"
          echo "Prod images: ghcr.io/${O}/react-auth-*:latest — UI http://localhost:8088 API http://localhost:3002"
          echo "Local prod stack (match PROD_VITE_API_URL to http://localhost:3002):"
          echo "  export GHCR_OWNER=${O} IMAGE_TAG=latest ENVIRONMENT=prod HOST_FRONTEND_PORT=8088 HOST_BACKEND_PORT=3002"
          echo "  docker compose -f docker-compose.ghcr.yml pull && docker compose -f docker-compose.ghcr.yml up -d"
